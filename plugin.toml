id = "net.mallard.discworld-magic"
name = "Discworld Magic"
version = "0.6.0"
description = "Magic highlights and inline annotations in game output, as well as some helper commands."
language = "lua"
entry = "src/main.lua"
mallard_api_version = "1.0"
minimum_app_version = "0.8.0"
authors = ["Wizard Quack"]
license = "MIT"

[permissions]
notifications = true
sends = true

[worlds]
match = ["discworld.starturtle.net:*"]

[settings.eff_drop_notify]
type = "bool"
default = true
label = "Floater-down system notification"
description = "Show a system notification when your Endorphin's Floating Friend (EFF) drops."

[settings.eff_drop_sound]
type = "bool"
default = false
label = "Floater-down sound"
description = "Play the mallard:ding-ding-low chime when your EFF drops."
